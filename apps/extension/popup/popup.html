<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0eae0;
      color: #151311;
      font-size: 13px;
      line-height: 1.4;
    }

    /* Inverted header */
    .header {
      background: #151311;
      color: #f0eae0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header-total {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: #c4813a;
    }

    .body-content { padding: 14px 16px; }

    /* Section label */
    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8a847d;
      margin-bottom: 8px;
      font-weight: 500;
    }

    /* Now Playing */
    .now-playing { padding: 0 0 10px 0; }
    .artist-name {
      font-size: 20px;
      font-weight: 700;
      color: #151311;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.15;
      letter-spacing: -0.3px;
    }
    .track-name {
      font-size: 13px;
      color: #5c5650;
      margin-top: 2px;
    }
    .platform-badge {
      display: inline-block;
      font-size: 9px;
      padding: 2px 6px;
      border: 1px solid #cdc5b8;
      color: #8a847d;
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Progress */
    .progress-container { margin-top: 10px; }
    .progress-bar {
      height: 3px;
      background: #cdc5b8;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      transition: width 0.3s ease, background-color 0.3s ease;
      width: 0%;
    }
    .progress-fill.listening { background: #151311; }
    .progress-fill.complete { background: #c4813a; }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #8a847d;
      margin-top: 3px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Gift result */
    .gift-result {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .gift-result.sent { color: #c4813a; }
    .gift-result.escrowed { color: #5c5650; }
    .gift-result a { color: inherit; }

    .gift-detail {
      font-size: 12px;
      color: #5c5650;
      margin-top: 4px;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #cdc5b8;
      margin: 12px 0;
    }

    /* History */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid rgba(205, 197, 184, 0.5);
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .h-artist {
      font-weight: 700;
      font-size: 13px;
    }
    .history-item .h-track {
      color: #8a847d;
      font-size: 11px;
    }
    .history-item .amount {
      color: #c4813a;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      white-space: nowrap;
    }
    .history-item .amount a { color: inherit; text-decoration: none; }
    .history-item .amount a:hover { text-decoration: underline; }

    .empty-state {
      padding: 16px 0;
      color: #8a847d;
      font-size: 12px;
    }

    /* Wallet */
    .wallet-section { padding: 0; }
    .wallet-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 12px;
    }
    .wallet-label { color: #8a847d; }
    .wallet-addr {
      color: #5c5650;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .wallet-addr:hover { color: #c4813a; }
    .wallet-val {
      color: #151311;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }
    .wallet-val.funded { color: #c4813a; }
    .wallet-val.empty { color: #8a847d; }
    .wallet-btn {
      width: 100%;
      background: #151311;
      color: #f0eae0;
      border: none;
      padding: 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .wallet-btn:hover { background: #c4813a; }
    .wallet-btn:disabled { opacity: 0.3; cursor: default; }
    .wallet-btn-sm {
      width: 100%;
      background: transparent;
      color: #5c5650;
      border: 1px solid #cdc5b8;
      padding: 6px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      margin-top: 6px;
    }
    .wallet-btn-sm:hover { border-color: #151311; color: #151311; }
    .wallet-fund { margin-top: 8px; }
    .fund-label {
      font-size: 10px;
      color: #8a847d;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .fund-addr {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #5c5650;
      word-break: break-all;
      background: #e5ded2;
      padding: 8px;
      border: 1px solid #cdc5b8;
    }
    .wallet-ready {
      display: inline-block;
      background: #c4813a;
      color: #f0eae0;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .wallet-error { color: #c4813a; font-size: 12px; }

    /* Onboarding / QR code */
    .onboard-text {
      font-size: 10px;
      color: #78716c;
      margin-bottom: 8px;
    }
    .qr-container {
      display: flex;
      justify-content: center;
      margin: 8px 0;
      background: #f5f0e8;
      border: 1px solid #c4bcb0;
      padding: 8px;
    }
    .qr-container canvas { display: block; }
    .qr-link {
      display: block;
      text-align: center;
      font-size: 10px;
      color: #8a847d;
      text-decoration: none;
      margin-top: 6px;
    }
    .qr-link:hover { color: #c4813a; text-decoration: underline; }
    .onboard-hint {
      font-size: 9px;
      color: #a8a29e;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #cdc5b8;
    }
    .footer a {
      font-size: 11px;
      color: #8a847d;
      text-decoration: none;
    }
    .footer a:hover { color: #151311; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">onda</div>
    <div class="header-total" id="total-given">$0.00</div>
  </div>

  <div class="body-content">
    <div id="wallet-section" class="wallet-section">
      <!-- Filled by JS -->
    </div>

    <hr class="divider">

    <div id="app">
      <div class="label">now listening</div>
      <div class="now-playing">
        <div class="artist-name" id="artist-name">--</div>
        <div class="track-name" id="track-name">play something to get started</div>
        <div id="platform-badge" style="display: none;"></div>
        <div class="progress-container" id="progress-container" style="display: none;">
          <div class="progress-bar">
            <div class="progress-fill listening" id="progress-fill"></div>
          </div>
          <div class="progress-text">
            <span id="progress-time">0s</span>
            <span id="progress-target">10s</span>
          </div>
        </div>
        <div class="gift-result" id="gift-result" style="display: none;"></div>
        <div class="gift-detail" id="gift-detail" style="display: none;"></div>
      </div>

      <div id="history-section" style="display: none;">
        <hr class="divider">
        <div class="label">recent</div>
        <div id="history-list"></div>
      </div>

      <div class="empty-state" id="empty-state"></div>
    </div>
  </div>

  <div class="footer">
    <a href="http://localhost:3000/dashboard" target="_blank">open dashboard</a>
  </div>

  <script src="popup.js" type="text/javascript"></script>
</body>
</html>
