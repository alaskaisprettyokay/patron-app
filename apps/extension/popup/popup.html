<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stats {
      font-size: 11px;
      color: #888;
      text-align: right;
    }
    .stats strong { color: #2ed573; }

    /* Now Playing */
    .now-playing {
      background: #111118;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #1a1a2e;
    }
    .status-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 8px;
    }
    .track-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist-name {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
    }
    .platform-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1a1a2e;
      color: #6c63ff;
      margin-bottom: 10px;
    }

    /* Progress bar */
    .progress-container {
      margin-top: 8px;
    }
    .progress-bar {
      height: 4px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease, background-color 0.3s ease;
      width: 0%;
    }
    .progress-fill.listening { background: linear-gradient(90deg, #6c63ff, #a855f7); }
    .progress-fill.complete { background: #2ed573; }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }

    /* Status states */
    .status-idle .now-playing { border-color: #1a1a2e; }
    .status-listening .now-playing { border-color: #6c63ff33; }
    .status-scrobbled .now-playing { border-color: #2ed57333; }
    .status-paused .now-playing { border-color: #ffd93d33; }
    .status-skipped .now-playing { border-color: #ff6b6b33; }

    .tip-result {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      color: #2ed573;
      font-weight: 500;
    }
    .tip-result.escrowed { color: #ffd93d; }

    /* Scrobble history */
    .history {
      margin-top: 4px;
    }
    .history-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #444;
      margin-bottom: 8px;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #111;
      font-size: 11px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-track { color: #ccc; }
    .history-artist { color: #888; font-size: 10px; }
    .history-amount { color: #2ed573; font-weight: 500; font-size: 11px; }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: #444;
      font-size: 12px;
    }
    .empty-state .emoji { font-size: 24px; margin-bottom: 8px; }

    .footer {
      margin-top: 12px;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: #6c63ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🎵 Patron</span>
    <div class="stats">
      <div><strong id="total-tipped">$0.00</strong> tipped</div>
      <div id="tip-count">0 scrobbles</div>
    </div>
  </div>

  <div id="app" class="status-idle">
    <div class="now-playing">
      <div class="status-label" id="status-label">Waiting for music...</div>
      <div class="track-name" id="track-name">—</div>
      <div class="artist-name" id="artist-name">Play something to get started</div>
      <div class="progress-container" id="progress-container" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill listening" id="progress-fill"></div>
        </div>
        <div class="progress-text">
          <span id="progress-time">0s</span>
          <span id="progress-target">10s</span>
        </div>
      </div>
      <div class="tip-result" id="tip-result" style="display: none;"></div>
    </div>

    <div class="history" id="history-section" style="display: none;">
      <div class="history-title">Recent Scrobbles</div>
      <div id="history-list"></div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="emoji">🎧</div>
      Play music on Spotify, SoundCloud, Bandcamp, or YouTube Music
    </div>
  </div>

  <div class="footer">
    <a href="http://localhost:3000/dashboard" target="_blank">Open Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
